<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<style>
    *{
        margin: 0;
        padding: 0;
    }
    .container1{
            background-color: maroon;
            border: 5px solid black;
            margin: 0;
            padding: 5px;
            display: flex;
            height: 100vh;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: start;
            align-items: start;

}

.container2{
            background-color: maroon;
            border: 5px solid black;
            margin: 0;
            padding: 5px;
            display: flex;
            height: 100vh;
            flex-direction: row;
            flex-wrap: wrap;
            justify-content: start;
            align-items: start;
            /* to get rid of space between boxes */
            /* Use this align-content: start */
            align-content: start;

}
        .box{
            height: 10vh;
            width: 10vh;
            margin: 2px;
            border: 2px solid yellow;
        }
    .box11{
        height: 100vh;
        width: 100vw;
        background-color: blanchedalmond;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 5px solid gray;
    }
    .container11{
        height: 200px;
        width: 200px;
        background-color: aqua;
        display: flex;
        justify-content: center;
        align-items: center;
        border: 5px solid gray;
        
    }

        #box1{
            background-color: Red;
        }
        #box2{
            background-color: blue;

        }
        #box3{
            background-color: green;

        }
        #box4{
            background-color: yellow;

        }
</style>
<body>
    <h1>Make the box in the center</h1>
    <div class="box11">
        <div class="container11">
            box1    
        </div>
    </div>


    
    <br>
    <br>
    <h1> With out align-content having space when width is decreased</h1>
    <div class="container1">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
    </div>    

    <br>
    <br>
    <h1>With align-content removes the space between boxes when width is decreased</h1>
     <div class="container2">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
    </div>  
</body>
</html>
