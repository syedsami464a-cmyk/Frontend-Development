<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
<style>
    .container,.container1,.container2{
        border: 4px solid black;
        background-color: aquamarine;
        padding: 2px;
        margin: 2px;
        display: flex;
    }


    .box{
        height: 150px;
        width: 150px;
        border: 2px solid green;
        padding: 2px;
        margin: 2px;
    }
    #box1{
        
        background-color: violet;
        flex-shrink: 4; /* shrink or decreased size 4 times fatser than remaining*/
    }
     #box11{
        
        background-color: violet;
    }
    #box2{
        background-color: maroon;

    }
    #box3{
        background-color: pink;

    }
    #box4{
        background-color: bisque;
    }
    #box41{
        background-color: rgb(254, 146, 14);
        flex-grow: 2;

    }

    #boxi1{
        
        background-color: violet;
    }
    #boxi2{
        background-color: maroon;

    }
    #boxi3{
        background-color: pink;

    }
    #boxi4{
        background-color: bisque;
        flex-basis: 250px;
    }
</style>
<body>
    <h1> box1 -> shrink or decreased size 4 times fatser than remaining</h1>
    <div class="container">
        <div class="box" id="box1"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box4"></div>
    </div>

    
    <h1> box4 -> grow or decreased size 4 times fatser than remaining</h1>
    <div class="container1">
        <div class="box" id="box11"></div>
        <div class="box" id="box2"></div>
        <div class="box" id="box3"></div>
        <div class="box" id="box41"></div>
    </div>

    <h1> box4 -> flex:basis -> used to change the dimension</h1>
    <div class="container2">
        <div class="box" id="boxi1"></div>
        <div class="box" id="boxi2"></div>
        <div class="box" id="boxi3"></div>
        <div class="box" id="boxi4"></div>
    </div>

</body>
</head>
</html>
