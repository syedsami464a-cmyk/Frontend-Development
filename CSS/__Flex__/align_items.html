 <style>
        .container1{
            height: 30vh;
            background-color: maroon;
            border: 5px solid black;
            margin: 0;
            padding: 5px;
            display: flex;
            /* it access the cross-axis */
            /* if flex-direction in row it works on column side
               if flex-direction in column it works on row side 
            */
            align-items: start;
            
            
            
        }
        .container2{
            height: 30vh;

}
