<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Diff b/w sticky and fixed</title>
    <style>
        .container{
            height: 2000px;
            background-color: blanchedalmond;
        }
        .img4{
            position:fixed;
        }
        .img1{
            position:sticky;
            top: 0;
        }
        .box{
            height: 1000px;
        }
    </style>
</head>
<body>
    <div class="container">

        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img1">

        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img2">
        
        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img3">
        
        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img4">

    </div>

    <div class="box">
        <img src="Logo1.jpg" alt="Poster5"
        height="300px" width="200px" class="img5">
    </div>
</body>
</html>
