<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sticky</title>
<style>
    .container{
        height: 2000px;
        background-color: aquamarine;
    }
    .img1{
        /* along with sticky you need to use top,left,...*/
        /* sticky will present till that container or its parent class*/
        position: sticky;
        top: 0;
    }
</style>
</head>
<body>
    <div class="container">

        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img1">

        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img2">
        
        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img3">
        
        <img src="Logo1.jpg" alt="Poster1" height="300px" width="200px" class="img4">

    </div>
</body>
</html>
