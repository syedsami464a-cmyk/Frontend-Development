<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Second Card</title>
    <link rel="stylesheet" href="style1.css">
</head>
<body>
    
<div class="container">
    <div class="card">
        <img src="image1.png" alt="Image">
        <div class="textbox">
        <h3>Order Summary Table</h3>

        <p>Lorem ipsum dolor sit amet consectetur adipisicing elit. Modi praesentium ipsa natus porro libero fugit, blanditiis expedita ea? Non, magnam?</p>
        </div>
        
        <div id="amountbox">
            <div class="leftbox">
                <div class="imgbox">
                    <img src="image.png" alt="image2" >

                <div class="textAmount">

                    <p>$99.9/Year</p>

            <div class="rightbox">
                <a href="#">Change</a>

        <div id="cancelbox">
            <a href="#">Cancel Box</a>
        </div>
    </div>
</div>
