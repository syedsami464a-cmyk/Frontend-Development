<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">

    <title>Event Loop 2</title>
</head>
<body>
    <button id="btn" type="button">Click Here</button>
    <script>
        let btn = document.getElementById("btn");
        btn.onclick = function () {
            console.log("Hello")
            console.log(this.id);
        }
    </script>
